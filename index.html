<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>IKI1UC · WORLD IS OPEN · AUTO‑SYSTEM · 6E · 6D · 100 · 360</title>

<style>
body { background:#000; color:#0f0; font-family:Consolas; padding:30px; }
h1 { color:#6cf; }
.block { background:#111; border:1px solid #333; padding:20px; margin:20px 0; }
pre { background:#000; border-left:3px solid #6cf; padding:15px; white-space:pre-wrap; }
</style>

<script type="module">

// ------------------------------------------------------
// AUTO‑SCANNER – findet ALLE Dateien im Repo
// ------------------------------------------------------

async function scanRepo(){
    const api = "https://api.github.com/repos/iki1uc/100/contents/";
    const res = await fetch(api);
    const files = await res.json();
    return files.map(f => f.name);
}

// ------------------------------------------------------
// AUTO‑LOADER – lädt jede Datei, egal welche Endung
// ------------------------------------------------------

async function loadFile(name){
    try{
        const res = await fetch(name);
        if(!res.ok) return { name, ok:false };
        const txt = await res.text();
        return { name, ok:true, content:txt };
    }catch(e){
        return { name, ok:false };
    }
}

// ------------------------------------------------------
// START – lädt ALLES
// ------------------------------------------------------

async function start(){
    const out = document.getElementById("sys");

    const repoFiles = await scanRepo();
    const loaded = [];

    for(const f of repoFiles){
        loaded.push(await loadFile(f));
    }

    out.innerText = JSON.stringify({
        SYSTEM: "IKI1UC · WORLD IS OPEN",
        AXES_6D: "geladen",
        ENERGY_6E: "geladen",
        RESPO_100: "aktiv",
        RESPO_360: "aktiv",
        FARB_MODE: "aktiv",
        NATUR_MODE: "aktiv",
        NC_SYSTEM: "aktiv",
        EVO_SYSTEM: "aktiv",
        OPTA_SYSTEM: "aktiv",
        CUBE_SYSTEM: "aktiv",
        FILES: loaded
    }, null, 2);
}

start();

</script>
</head>

<body>

<h1>IKI1UC · WORLD IS OPEN · AUTO‑SYSTEM</h1>

<div class="block">
    <h2>System‑Status</h2>
    <pre id="sys">Lade…</pre>
</div>

</body>
</html>
