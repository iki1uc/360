<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>EVO · 360° · Cube · Opta² · Opta³ · Heatmap · Respo</title>

<style>
  body { background:#000; color:#fff; font-family:Consolas; padding:20px; }
  h1, h2 { color:#0ff; }
  .block { background:#111; border:1px solid #333; padding:15px; margin:20px 0; }
  pre { background:#000; border:1px solid #333; padding:12px; }
  .cube-face { width:120px; height:120px; display:inline-block; margin:10px; }
</style>

<script>
// ------------------------------------------------------
// EVO ENGINE – liest verify.html
// ------------------------------------------------------

async function loadVerify(){
  const res = await fetch("verify.html");
  const txt = await res.text();
  return txt;
}

// Farben aus verify bestimmen
function getColor(status){
  if(status.includes("GRÜN")) return "#00ff88";
  if(status.includes("GELB")) return "#ffff33";
  if(status.includes("ORANGE")) return "#ff9900";
  if(status.includes("ROT")) return "#ff4444";
  if(status.includes("TÜRKIS")) return "#00ffff";
  if(status.includes("BLAU")) return "#3399ff";
  return "#666";
}

// Cube erzeugen
function buildCube(verify){
  const faces = ["Front","Back","Left","Right","Top","Bottom"];
  const cube = document.getElementById("cube");

  faces.forEach(f => {
    const div = document.createElement("div");
    div.className = "cube-face";
    div.style.background = getColor(verify);
    div.innerHTML = f;
    div.onclick = () => zoomDetail(f, verify);
    cube.appendChild(div);
  });
}

// Zoom‑Detail‑Sicht
function zoomDetail(face, verify){
  document.getElementById("zoom").textContent =
    "ZOOM: " + face + "\n\n" + verify;
}

// Opta² / Opta³
function buildOpta(verify){
  document.getElementById("opta2").textContent = "Opta²:\n" + verify;
  document.getElementById("opta3").textContent = "Opta³:\n" + verify;
}

// Heatmap
function buildHeatmap(verify){
  document.getElementById("heatmap").textContent =
    "Heatmap:\n" + verify;
}

// Respo‑Vergleich
function buildRespo(verify){
  document.getElementById("respo").textContent =
    "Respo‑Vergleich:\n" + verify;
}

// Start
async function start(){
  const verify = await loadVerify();

  buildCube(verify);
  buildOpta(verify);
  buildHeatmap(verify);
  buildRespo(verify);
}
</script>
</head>

<body onload="start()">

<h1>EVO · 360° · Cube · Opta² · Opta³ · Heatmap · Respo</h1>

<div class="block">
  <h2>Cube‑Engine</h2>
  <div id="cube"></div>
</div>

<div class="block">
  <h2>Zoom‑Detail‑Sicht</h2>
  <pre id="zoom">…</pre>
</div>

<div class="block">
  <h2>Opta²</h2>
  <pre id="opta2">…</pre>
</div>

<div class="block">
  <h2>Opta³</h2>
  <pre id="opta3">…</pre>
</div>

<div class="block">
  <h2>Fehler‑Heatmap</h2>
  <pre id="heatmap">…</pre>
</div>

<div class="block">
  <h2>Respo‑Vergleich</h2>
  <pre id="respo">…</pre>
</div>

</body>
</html>
